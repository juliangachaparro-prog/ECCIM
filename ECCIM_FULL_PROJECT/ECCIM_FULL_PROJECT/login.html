<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Login</title>

    <link
    rel="stylesheet"
    href="css/style.css">

</head>

<body>

    <div class="container">

        <h1>Login</h1>

        <form id="formLogin">

            <input
            type="email"
            id="correo"
            placeholder="Correo"
            required>

            <input
            type="password"
            id="password"
            placeholder="Contraseña"
            required>

            <button type="submit">

                Ingresar

            </button>

        </form>

    </div>

    <!-- MD5 -->
    <script src="https://cdn.jsdelivr.net/npm/js-md5@0.8.3/src/md5.min.js"></script>

    <!-- TU JS -->
    <script
    type="module"
    src="js/login.js">

    </script>

</body>
</html>
